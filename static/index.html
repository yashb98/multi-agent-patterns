<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge MindGraph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;height:100vh}
.topbar{position:fixed;top:0;left:0;right:0;height:50px;background:#1e293b;border-bottom:1px solid #334155;display:flex;align-items:center;padding:0 14px;gap:10px;z-index:100}
.topbar h1{font-size:15px;font-weight:600;color:#8B5CF6;white-space:nowrap}
#search{background:#0f172a;border:1px solid #475569;border-radius:5px;color:#e2e8f0;padding:5px 10px;width:200px;font-size:12px}
#search:focus{outline:none;border-color:#8B5CF6}
.fg{display:flex;gap:4px;flex-wrap:wrap}
.fb{font-size:10px;padding:2px 6px;border-radius:3px;border:1px solid #475569;background:transparent;color:#94a3b8;cursor:pointer}
.fb.on{background:var(--c);color:#fff;border-color:var(--c)}
.tr{margin-left:auto;display:flex;gap:6px}
.btn{font-size:11px;padding:4px 10px;border-radius:4px;border:1px solid #475569;background:#1e293b;color:#e2e8f0;cursor:pointer;text-decoration:none}
.btn:hover{background:#334155}
.btn.galaxy-back{background:#8B5CF6;border-color:#8B5CF6;color:#fff;display:none}
.btn.galaxy-back.show{display:inline-block}
.sb{position:fixed;top:50px;left:0;bottom:40px;width:280px;background:#1e293b;border-right:1px solid #334155;z-index:90;overflow-y:auto;padding:14px;transition:transform .2s}
.sb.hide{transform:translateX(-280px)}
.st{position:fixed;top:56px;left:4px;z-index:95;background:#334155;border:none;color:#e2e8f0;padding:3px 7px;border-radius:3px;cursor:pointer;font-size:14px}
.tg{display:flex;margin-bottom:10px}.tb{flex:1;padding:6px;text-align:center;font-size:11px;cursor:pointer;border:1px solid #475569;background:transparent;color:#94a3b8}
.tb:first-child{border-radius:5px 0 0 5px}.tb:last-child{border-radius:0 5px 5px 0}.tb.on{background:#8B5CF6;color:#fff;border-color:#8B5CF6}
.tc{display:none}.tc.on{display:block}
textarea{width:100%;height:160px;background:#0f172a;border:1px solid #475569;border-radius:5px;color:#e2e8f0;padding:8px;font-size:12px;resize:vertical;font-family:inherit}
textarea:focus{outline:none;border-color:#8B5CF6}
.dz{border:2px dashed #475569;border-radius:7px;padding:30px 14px;text-align:center;color:#64748b;font-size:12px;cursor:pointer}.dz:hover{border-color:#8B5CF6;color:#8B5CF6}.dz input{display:none}
#ui{width:100%;background:#0f172a;border:1px solid #475569;border-radius:5px;color:#e2e8f0;padding:7px 10px;font-size:12px;margin-bottom:6px}
.xb{width:100%;padding:8px;background:#8B5CF6;color:#fff;border:none;border-radius:5px;font-size:12px;cursor:pointer;font-weight:600;margin-top:6px}.xb:hover{background:#7c3aed}
#prog{margin-top:8px;font-size:11px;color:#94a3b8}
.ga{position:fixed;top:50px;left:280px;right:0;bottom:40px;position:relative}.ga.full{left:0}
svg{width:100%;height:100%;position:relative;z-index:2}
#particles{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
.dp{position:fixed;top:50px;right:-360px;bottom:40px;width:360px;background:#1e293b;border-left:1px solid #334155;z-index:85;transition:right .2s;padding:18px;overflow-y:auto}.dp.open{right:0}
.dp h2{font-size:17px;margin-bottom:3px}.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;margin-bottom:6px}
.dp p{font-size:12px;color:#94a3b8;margin-bottom:10px}.dp h4{font-size:11px;text-transform:uppercase;color:#64748b;margin:10px 0 5px}
.cn{font-size:11px;padding:3px 0;border-bottom:1px solid #0f172a;color:#cbd5e1}.dc{position:absolute;top:10px;right:10px;background:none;border:none;color:#64748b;font-size:16px;cursor:pointer}
.sp{position:fixed;top:56px;right:10px;background:#1e293b99;backdrop-filter:blur(8px);border:1px solid #334155;border-radius:7px;padding:10px 14px;font-size:11px;z-index:80;min-width:160px}
.sp h3{font-size:10px;text-transform:uppercase;color:#64748b;margin-bottom:4px}.sr{display:flex;justify-content:space-between;margin:2px 0}.sv{color:#8B5CF6;font-weight:600}
.tl{position:fixed;bottom:0;left:0;right:0;height:40px;background:#1e293b;border-top:1px solid #334155;display:flex;align-items:center;padding:0 14px;gap:6px;overflow-x:auto;z-index:100}
.td{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;cursor:pointer;border:1px solid #334155;color:#94a3b8;flex-shrink:0;position:relative}
.td:hover{border-color:#8B5CF6}.td.now{border-color:#8B5CF6;color:#fff;background:#8B5CF622}
.td .dot{position:absolute;bottom:-2px;width:4px;height:4px;border-radius:50%;background:#3B82F6}
.td .dot.pos{background:#10B981}.td .dot.neg{background:#EF4444}
.tll{font-size:10px;color:#64748b;white-space:nowrap;margin-right:6px}
.tt{position:fixed;background:#1e293bee;backdrop-filter:blur(8px);border:1px solid #475569;border-radius:8px;padding:10px 14px;font-size:12px;pointer-events:none;z-index:150;max-width:340px;opacity:0;transition:opacity .12s;line-height:1.5;box-shadow:0 4px 20px #00000066}.tt.show{opacity:1}
.tt b{color:#f1f5f9;font-size:13px;display:block;margin-bottom:2px}.tt .tp{color:#8B5CF6;font-size:11px;font-weight:600}.tt .td2{color:#b0bec5;margin-top:5px;font-size:11px;border-top:1px solid #334155;padding-top:5px}.tt .tm{color:#64748b;font-size:10px;margin-top:3px}
.lg{position:fixed;bottom:46px;left:286px;background:#1e293b99;backdrop-filter:blur(8px);border:1px solid #334155;border-radius:7px;padding:6px 10px;z-index:80;display:flex;flex-wrap:wrap;gap:6px}.lg.full{left:6px}
.li{display:flex;align-items:center;gap:3px;font-size:10px;color:#94a3b8;cursor:pointer}.ld{width:8px;height:8px;border-radius:50%}
.toast{position:fixed;bottom:50px;right:16px;background:#10B981;color:#fff;padding:10px 16px;border-radius:7px;font-size:12px;z-index:200;opacity:0;transition:opacity .3s}.toast.show{opacity:1}
/* Galaxy mode indicator */
.mode-badge{position:fixed;top:56px;left:50%;transform:translateX(-50%);background:#8B5CF622;border:1px solid #8B5CF6;border-radius:5px;padding:4px 14px;font-size:11px;color:#8B5CF6;font-weight:600;z-index:80;display:none;pointer-events:none}
.mode-badge.show{display:block}
/* Node breathing animation */
@keyframes breathe{0%,100%{filter:url(#nodeGlow);opacity:1}50%{filter:url(#nodeGlowBright);opacity:0.92}}
.node-breathe{animation:breathe 3s ease-in-out infinite}
/* Edge pulse */
@keyframes edgePulse{0%,100%{stroke-opacity:0.3}50%{stroke-opacity:0.6}}
.edge-pulse{animation:edgePulse 2s ease-in-out infinite}
</style>
</head>
<body>
<div class="topbar">
<h1>Knowledge MindGraph</h1>
<input type="text" id="search" placeholder="Search entities...">
<div class="fg" id="fil"></div>
<div class="tr">
<button class="btn galaxy-back" id="galaxyBack" onclick="backToUniverse()">Back to Universe</button>
<a href="/processes.html" class="btn" style="text-decoration:none">Processes</a>
<button class="btn" onclick="resetV()">Reset</button>
<button class="btn" onclick="expPNG()">PNG</button>
</div>
</div>
<div class="mode-badge" id="modeBadge"></div>
<button class="st" onclick="togSB()">☰</button>
<div class="sb" id="sb"><div class="tg"><div class="tb on" onclick="stab('paste',this)">Paste</div><div class="tb" onclick="stab('upload',this)">Upload</div><div class="tb" onclick="stab('url',this)">URL</div></div>
<div class="tc on" id="t-paste"><textarea id="ptxt" placeholder="Paste text to extract knowledge..."></textarea><button class="xb" onclick="iPaste()">Extract</button></div>
<div class="tc" id="t-upload"><div class="dz" onclick="document.getElementById('fi').click()">Drop .md/.txt here or click<input type="file" id="fi" accept=".md,.txt"></div><div id="fn" style="margin-top:6px;font-size:11px;color:#64748b"></div><button class="xb" onclick="iFile()">Extract File</button></div>
<div class="tc" id="t-url"><input type="text" id="ui" placeholder="https://..."><button class="xb" onclick="iURL()">Fetch & Extract</button></div>
<div id="prog"></div></div>
<div class="ga" id="ga"><canvas id="particles"></canvas><svg id="svg"></svg></div>
<div class="sp" id="sp"></div>
<div class="lg" id="lg"></div>
<div class="dp" id="dp"><button class="dc" onclick="closeDP()">✕</button><div id="dpc"></div></div>
<div class="tt" id="tt"></div>
<div class="toast" id="toast"></div>
<div class="tl" id="tl"><span class="tll">Timeline:</span></div>

<script>
const A='/api/mindgraph';
const C={PROJECT:'#8B5CF6',TECHNOLOGY:'#3B82F6',CONCEPT:'#10B981',DECISION:'#F59E0B',PERSON:'#EC4899',COMPANY:'#EF4444',METRIC:'#6B7280',SKILL:'#14B8A6',PHASE:'#6366F1',RESEARCH_PAPER:'#EAB308',AGENT:'#A855F7',EVENT:'#F97316',EMAIL:'#FB923C',TASK:'#22D3EE'};
const GALAXY_THRESHOLD = 300;

let sim, svg, g, nE, lE, gD={nodes:[],edges:[]}, aF=new Set(Object.keys(C)), sq='';
let viewMode = 'planet';
let currentGalaxy = null;
let galaxySim = null;
let orbitTimer = null;

// ── Particle & Starfield System ──
let pCanvas, pCtx, stars=[], particles=[], pRAF=null;
const STAR_COUNT = 200;
const PARTICLES_PER_EDGE = 3;

function initParticleSystem(){
    pCanvas = document.getElementById('particles');
    pCtx = pCanvas.getContext('2d');
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    generateStars();
    animateParticles();
}

function resizeCanvas(){
    if(!pCanvas) return;
    const ga = document.getElementById('ga');
    pCanvas.width = ga.clientWidth * devicePixelRatio;
    pCanvas.height = ga.clientHeight * devicePixelRatio;
    pCtx.scale(devicePixelRatio, devicePixelRatio);
    generateStars();
}

function generateStars(){
    stars = [];
    const w = pCanvas.width / devicePixelRatio;
    const h = pCanvas.height / devicePixelRatio;
    for(let i=0; i<STAR_COUNT; i++){
        stars.push({
            x: Math.random()*w, y: Math.random()*h,
            r: Math.random()*1.2 + 0.3,
            baseAlpha: Math.random()*0.4 + 0.1,
            twinkleSpeed: Math.random()*0.02 + 0.005,
            twinkleOffset: Math.random()*Math.PI*2,
        });
    }
}

function spawnEdgeParticles(){
    // Called after each render — creates particles that flow along edges
    particles = [];
    if(!lE) return;
    lE.each(function(d){
        const src = d.source, tgt = d.target;
        if(!src || !tgt || src.x==null || tgt.x==null) return;
        const col = C[src.entity_type] || C[tgt.entity_type] || '#8B5CF6';
        for(let i=0; i<PARTICLES_PER_EDGE; i++){
            particles.push({
                sx: src.x, sy: src.y, tx: tgt.x, ty: tgt.y,
                progress: Math.random(),  // 0-1 along the edge
                speed: 0.003 + Math.random()*0.004,
                size: Math.random()*1.5 + 0.5,
                color: col,
                alpha: Math.random()*0.5 + 0.3,
                sourceRef: src, targetRef: tgt,
            });
        }
    });
}

function animateParticles(){
    if(!pCtx || !pCanvas) return;
    const w = pCanvas.width / devicePixelRatio;
    const h = pCanvas.height / devicePixelRatio;

    // Clear
    pCtx.setTransform(1,0,0,1,0,0);
    pCtx.scale(devicePixelRatio, devicePixelRatio);
    pCtx.clearRect(0,0,w,h);

    const time = Date.now() * 0.001;

    // Draw starfield
    for(const s of stars){
        const twinkle = Math.sin(time * s.twinkleSpeed * 10 + s.twinkleOffset);
        const alpha = s.baseAlpha + twinkle * 0.15;
        pCtx.beginPath();
        pCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        pCtx.fillStyle = `rgba(200,210,230,${Math.max(0.05, alpha)})`;
        pCtx.fill();
    }

    // Get current SVG transform to align canvas particles with SVG nodes
    const svgEl = document.getElementById('svg');
    const gEl = g?.node();
    let tx=0, ty=0, sc=1;
    if(gEl){
        const transform = gEl.getAttribute('transform');
        if(transform){
            const m = transform.match(/translate\(([-\d.]+)[,\s]+([-\d.]+)\)/);
            const s2 = transform.match(/scale\(([-\d.]+)\)/);
            if(m){ tx=parseFloat(m[1]); ty=parseFloat(m[2]); }
            if(s2) sc=parseFloat(s2[1]);
        }
    }
    // Parse zoom transform from D3
    const svgNode = svg?.node();
    if(svgNode && svgNode.__zoom){
        tx = svgNode.__zoom.x; ty = svgNode.__zoom.y; sc = svgNode.__zoom.k;
    }

    // Offset for .ga element position
    const gaRect = document.getElementById('ga').getBoundingClientRect();
    const svgRect = svgEl?.getBoundingClientRect();
    const ox = 0, oy = 0;

    // Draw flowing particles along edges
    for(const p of particles){
        // Update live positions from simulation refs
        if(p.sourceRef && p.sourceRef.x != null){
            p.sx = p.sourceRef.x; p.sy = p.sourceRef.y;
        }
        if(p.targetRef && p.targetRef.x != null){
            p.tx = p.targetRef.x; p.ty = p.targetRef.y;
        }

        p.progress += p.speed;
        if(p.progress > 1) p.progress -= 1;

        // Interpolate position
        const x = p.sx + (p.tx - p.sx) * p.progress;
        const y = p.sy + (p.ty - p.sy) * p.progress;

        // Apply SVG transform
        const cx = x * sc + tx + ox;
        const cy = y * sc + ty + oy;

        // Fade in/out at edges
        const edgeFade = Math.sin(p.progress * Math.PI);
        const alpha = p.alpha * edgeFade;

        // Glow
        pCtx.beginPath();
        pCtx.arc(cx, cy, p.size * sc * 2, 0, Math.PI*2);
        pCtx.fillStyle = p.color + Math.round(alpha*30).toString(16).padStart(2,'0');
        pCtx.fill();

        // Core
        pCtx.beginPath();
        pCtx.arc(cx, cy, p.size * sc, 0, Math.PI*2);
        pCtx.fillStyle = p.color + Math.round(alpha*200).toString(16).padStart(2,'0');
        pCtx.fill();
    }

    pRAF = requestAnimationFrame(animateParticles);
}

function stopParticleAnimation(){ if(pRAF){cancelAnimationFrame(pRAF);pRAF=null} }

// ── Init ──
function init(){ bFil(); bLeg(); sSVG(); sSrch(); sDZ(); initParticleSystem(); load(); loadTL() }

function bFil(){const c=document.getElementById('fil');for(const[t,cl]of Object.entries(C)){const b=document.createElement('button');b.className='fb on';b.style.setProperty('--c',cl);b.textContent=t;b.onclick=()=>{aF.has(t)?(aF.delete(t),b.classList.remove('on')):(aF.add(t),b.classList.add('on'));render()};c.appendChild(b)}}
function bLeg(){const c=document.getElementById('lg');for(const[t,cl]of Object.entries(C)){const i=document.createElement('div');i.className='li';i.innerHTML=`<div class="ld" style="background:${cl}"></div>${t}`;c.appendChild(i)}}

function sSVG(){
    svg=d3.select('#svg');
    // Glow filter for galaxies
    const defs = svg.append('defs');
    defs.append('marker').attr('id','arr').attr('viewBox','0 -5 10 10').attr('refX',20).attr('refY',0).attr('markerWidth',5).attr('markerHeight',5).attr('orient','auto').append('path').attr('d','M0,-5L10,0L0,5').attr('fill','#47556966');

    // Galaxy glow filter
    const glow = defs.append('filter').attr('id','glow').attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
    glow.append('feGaussianBlur').attr('stdDeviation','8').attr('result','blur');
    glow.append('feComposite').attr('in','SourceGraphic').attr('in2','blur').attr('operator','over');

    // Stronger glow for galaxy cores
    const glowStrong = defs.append('filter').attr('id','glowStrong').attr('x','-80%').attr('y','-80%').attr('width','260%').attr('height','260%');
    glowStrong.append('feGaussianBlur').attr('stdDeviation','15').attr('result','blur');
    glowStrong.append('feComposite').attr('in','SourceGraphic').attr('in2','blur').attr('operator','over');

    // Node glow (subtle)
    const nodeGlow = defs.append('filter').attr('id','nodeGlow').attr('x','-40%').attr('y','-40%').attr('width','180%').attr('height','180%');
    nodeGlow.append('feGaussianBlur').attr('stdDeviation','3').attr('result','blur');
    nodeGlow.append('feComposite').attr('in','SourceGraphic').attr('in2','blur').attr('operator','over');

    // Node glow bright (for breathing peak)
    const nodeGlowB = defs.append('filter').attr('id','nodeGlowBright').attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
    nodeGlowB.append('feGaussianBlur').attr('stdDeviation','5').attr('result','blur');
    nodeGlowB.append('feComposite').attr('in','SourceGraphic').attr('in2','blur').attr('operator','over');

    g=svg.append('g');
    svg.call(d3.zoom().scaleExtent([.1,8]).on('zoom',e=>g.attr('transform',e.transform)));
    svg.on('click',e=>{if(e.target.tagName==='svg'){closeDP();rHL()}})
}
function sSrch(){let t;document.getElementById('search').addEventListener('input',e=>{clearTimeout(t);t=setTimeout(()=>{sq=e.target.value.toLowerCase();uHL()},300)})}
function sDZ(){const fi=document.getElementById('fi');fi.addEventListener('change',()=>{if(fi.files.length)document.getElementById('fn').textContent=fi.files[0].name})}

async function load(){try{const[gr,st]=await Promise.all([fetch(`${A}/graph`).then(r=>r.json()),fetch(`${A}/stats`).then(r=>r.json())]);gD=gr;render();uSt(st)}catch(e){}}

// ── Main Render — decides planet vs galaxy mode ──
function render(){
    stopOrbitAnimation();
    if(galaxySim){galaxySim.stop();galaxySim=null}
    if(sim){sim.stop();sim=null}
    g.selectAll('*').remove();

    const ns = gD.nodes.filter(n=>aF.has(n.entity_type));
    const totalNodes = ns.length;
    const totalEdges = gD.edges.filter(e=>{
        const nids=new Set(ns.map(n=>n.id));
        return nids.has(e.from_id)&&nids.has(e.to_id);
    }).length;

    // If we're inside a galaxy, always show planet view for that type
    if(viewMode === 'galaxy-dive' && currentGalaxy){
        renderGalaxyDive(currentGalaxy);
        return;
    }

    // Threshold check: nodes OR edges > 300 triggers galaxy mode
    if(totalNodes >= GALAXY_THRESHOLD || totalEdges >= GALAXY_THRESHOLD){
        viewMode = 'galaxy';
        renderGalaxyView(ns);
    } else {
        viewMode = 'planet';
        renderPlanetView(ns);
    }
    updateModeUI();
}

// ── Planet View (original, < 300 nodes) ──
function renderPlanetView(ns){
    const el=document.getElementById('ga'), w=el.clientWidth, h=el.clientHeight;
    const nids=new Set(ns.map(n=>n.id));
    const ls=gD.edges.filter(e=>nids.has(e.from_id)&&nids.has(e.to_id)).map(e=>({...e,source:e.from_id,target:e.to_id}));

    sim=d3.forceSimulation(ns)
        .force('link',d3.forceLink(ls).id(d=>d.id).distance(160))
        .force('charge',d3.forceManyBody().strength(-400))
        .force('center',d3.forceCenter(w/2,h/2))
        .force('collision',d3.forceCollide().radius(d=>nr(d)+25));

    lE=g.append('g').selectAll('line').data(ls).join('line')
        .attr('stroke',d=>{const s=ns.find(n=>n.id===(d.source.id||d.source));return s?C[s.entity_type]+'4D':'#475569'})
        .attr('stroke-width',1.5).attr('marker-end','url(#arr)')
        .on('mouseover',(e,d)=>sT(e,`<b>${d.type}</b><br>${d.context||''}`)).on('mouseout',hT);

    // Node glow halos (drawn behind nodes)
    g.append('g').selectAll('circle').data(ns).join('circle')
        .attr('r',d=>nr(d)*1.8).attr('fill',d=>(C[d.entity_type]||'#6B7280')+'15')
        .attr('filter','url(#nodeGlow)').attr('pointer-events','none')
        .each(function(d){ d._halo=this });

    nE=g.append('g').selectAll('circle').data(ns).join('circle')
        .attr('r',nr).attr('fill',d=>C[d.entity_type]||'#6B7280')
        .attr('stroke','#0f172a').attr('stroke-width',1.5).style('cursor','pointer')
        .attr('filter','url(#nodeGlow)')
        .call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y}).on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y}).on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}))
        .on('mouseover',(e,d)=>{
            const connCount = gD.edges.filter(x=>x.from_id===d.id||x.to_id===d.id).length;
            sT(e,`<b>${d.name}</b><span class="tp">${d.entity_type}</span>${d.description?`<div class="td2">${d.description}</div>`:''}<div class="tm">${d.mention_count||1} mentions · ${connCount} connections · importance ${((d.importance||0)*100).toFixed(0)}%</div>`)
        })
        .on('mouseout',hT).on('click',(e,d)=>{e.stopPropagation();showDP(d)}).on('dblclick',(e,d)=>{e.stopPropagation();focN(d)});

    // Node name labels
    const labelG = g.append('g').selectAll('g').data(ns).join('g').attr('pointer-events','none');
    labelG.append('text')
        .attr('class','node-label')
        .attr('font-size', d=>Math.max(10, Math.min(14, nr(d)*0.35)))
        .attr('fill','#f1f5f9').attr('font-weight',600)
        .attr('text-anchor','middle').attr('dy',d=>nr(d)+14)
        .text(d=>d.name.length>22?d.name.slice(0,20)+'…':d.name);
    // Type sub-label
    labelG.append('text')
        .attr('class','type-label')
        .attr('font-size',9).attr('fill',d=>(C[d.entity_type]||'#6B7280')+'CC')
        .attr('text-anchor','middle').attr('dy',d=>nr(d)+26)
        .text(d=>d.entity_type);

    sim.on('tick',()=>{
        lE.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
        nE.attr('cx',d=>d.x).attr('cy',d=>d.y);
        // Move halos with nodes
        ns.forEach(d=>{ if(d._halo) d3.select(d._halo).attr('cx',d.x).attr('cy',d.y) });
        labelG.attr('transform',d=>`translate(${d.x},${d.y})`)
    });
    nE.style('opacity',0).transition().duration(400).style('opacity',1);

    // Spawn particles after simulation stabilizes
    setTimeout(()=>spawnEdgeParticles(), 500);
}


// ── Galaxy View (>= 300 nodes) — each entity_type is a galaxy ──
function renderGalaxyView(allNodes){
    const el=document.getElementById('ga'), w=el.clientWidth, h=el.clientHeight;

    // Build galaxy data: group nodes by entity_type
    const galaxyMap = {};
    for(const n of allNodes){
        if(!galaxyMap[n.entity_type]) galaxyMap[n.entity_type] = {type:n.entity_type, nodes:[], color:C[n.entity_type]||'#6B7280'};
        galaxyMap[n.entity_type].nodes.push(n);
    }
    const galaxies = Object.values(galaxyMap).filter(g=>g.nodes.length>0);

    // Count cross-galaxy relations (edges between different entity types)
    const nodeTypeMap = {};
    for(const n of allNodes) nodeTypeMap[n.id] = n.entity_type;

    const crossLinks = {};
    for(const e of gD.edges){
        const fromType = nodeTypeMap[e.from_id];
        const toType = nodeTypeMap[e.to_id];
        if(fromType && toType && fromType !== toType){
            const key = [fromType,toType].sort().join('|');
            crossLinks[key] = (crossLinks[key]||0) + 1;
        }
    }
    const galaxyLinks = Object.entries(crossLinks).map(([key,count])=>{
        const [a,b] = key.split('|');
        return {source:a, target:b, count};
    });

    // Galaxy radius based on node count
    const maxCount = Math.max(...galaxies.map(g=>g.nodes.length));
    const gRadius = d => Math.max(30, Math.min(90, 30 + (d.nodes.length / maxCount) * 60));

    // Force simulation for galaxies
    galaxySim = d3.forceSimulation(galaxies)
        .force('link', d3.forceLink(galaxyLinks).id(d=>d.type).distance(200).strength(0.3))
        .force('charge', d3.forceManyBody().strength(-800))
        .force('center', d3.forceCenter(w/2, h/2))
        .force('collision', d3.forceCollide().radius(d=>gRadius(d)+30));

    // Draw cross-galaxy links
    const linkEl = g.append('g').selectAll('line').data(galaxyLinks).join('line')
        .attr('stroke','#475569').attr('stroke-width', d=>Math.min(6, 1 + d.count * 0.3))
        .attr('stroke-opacity', 0.3).attr('stroke-dasharray','6,4');

    // Draw galaxy groups
    const galaxyG = g.append('g').selectAll('g').data(galaxies).join('g')
        .style('cursor','pointer')
        .on('click',(e,d)=>{ e.stopPropagation(); diveIntoGalaxy(d.type) })
        .on('mouseover',(e,d)=>{
            const topNodes = d.nodes.sort((a,b)=>(b.mention_count||1)-(a.mention_count||1)).slice(0,5);
            const topList = topNodes.map(n=>`<br>  · ${n.name} (${n.mention_count||1})`).join('');
            sT(e,`<b>${d.type} Galaxy</b><br><span class="tp">${d.nodes.length} entities</span>${topList}`)
        })
        .on('mouseout',hT)
        .call(d3.drag()
            .on('start',(e,d)=>{if(!e.active)galaxySim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y})
            .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y})
            .on('end',(e,d)=>{if(!e.active)galaxySim.alphaTarget(0);d.fx=null;d.fy=null})
        );

    // Outer nebula cloud (multiple semi-transparent rings)
    galaxyG.append('circle')
        .attr('r', d=>gRadius(d) * 2.0)
        .attr('fill', d=>d.color+'05')
        .attr('filter','url(#glowStrong)');

    galaxyG.append('circle')
        .attr('r', d=>gRadius(d) * 1.6)
        .attr('fill', d=>d.color+'0A')
        .attr('filter','url(#glowStrong)');

    // Orbit rings (tilted ellipses for 3D depth effect)
    galaxyG.each(function(d){
        const gg = d3.select(this);
        const r = gRadius(d);
        // 3 orbit rings at different radii, tilted
        [0.55, 0.75, 0.95].forEach((ratio, i)=>{
            gg.append('ellipse')
                .attr('rx', r * ratio)
                .attr('ry', r * ratio * 0.35)  // flattened for 3D perspective
                .attr('fill','none')
                .attr('stroke', d.color+'20')
                .attr('stroke-width', 0.8)
                .attr('stroke-dasharray', '3,5')
                .attr('transform', `rotate(${-15 + i*20})`);
        });
    });

    // Core nebula (radial gradient effect via multiple circles)
    galaxyG.append('circle')
        .attr('r', d=>gRadius(d) * 1.1)
        .attr('fill', d=>d.color+'15')
        .attr('filter','url(#glow)');

    // Inner core ring
    galaxyG.append('circle')
        .attr('r', d=>gRadius(d) * 0.5)
        .attr('fill', d=>d.color+'20')
        .attr('filter','url(#glow)');

    // Solid bright core
    galaxyG.append('circle')
        .attr('r', d=>gRadius(d) * 0.25)
        .attr('fill', d=>d.color)
        .attr('opacity', 0.9)
        .attr('filter','url(#glowStrong)');

    // Core highlight (white center for star-like effect)
    galaxyG.append('circle')
        .attr('r', d=>gRadius(d) * 0.08)
        .attr('fill', '#fff')
        .attr('opacity', 0.7);

    // Orbiting planet dots — show up to 25 mini dots per galaxy
    galaxyG.each(function(d){
        const gg = d3.select(this);
        const r = gRadius(d);
        const planetCount = Math.min(25, d.nodes.length);
        const sorted = d.nodes.sort((a,b)=>(b.mention_count||1)-(a.mention_count||1)).slice(0, planetCount);

        // Multiple orbit bands
        sorted.forEach((node, i) => {
            const band = i % 3;  // 3 orbit bands
            const angleSpread = (2 * Math.PI * i) / planetCount + band * 0.3;
            const orbitR = r * (0.45 + band * 0.2 + Math.random() * 0.1);
            const planetR = Math.max(1.5, Math.min(5, 1.5 + (node.mention_count||1) * 0.4));
            const yScale = 0.35 + band * 0.1;  // flatten for 3D perspective

            // Planet glow
            gg.append('circle')
                .attr('class','orbit-planet-glow')
                .attr('r', planetR * 2.5)
                .attr('fill', d.color+'15')
                .attr('pointer-events','none')
                .datum({angle: angleSpread, orbitR, yScale, speed: 0.002 + Math.random()*0.003 - band*0.0005});

            // Planet body
            gg.append('circle')
                .attr('class','orbit-planet')
                .attr('cx', Math.cos(angleSpread) * orbitR)
                .attr('cy', Math.sin(angleSpread) * orbitR * yScale)
                .attr('r', planetR)
                .attr('fill', d.color)
                .attr('opacity', 0.7)
                .datum({angle: angleSpread, orbitR, yScale, speed: 0.002 + Math.random()*0.003 - band*0.0005, parentData: d});
        });
    });

    // Galaxy label
    galaxyG.append('text')
        .attr('y', d=>gRadius(d) + 18)
        .attr('text-anchor','middle').attr('fill','#e2e8f0')
        .attr('font-size', 12).attr('font-weight', 600)
        .text(d=>d.type);

    // Node count label
    galaxyG.append('text')
        .attr('y', d=>gRadius(d) + 30)
        .attr('text-anchor','middle').attr('fill','#64748b')
        .attr('font-size', 10)
        .text(d=>`${d.nodes.length} entities`);

    // Tick
    galaxySim.on('tick',()=>{
        linkEl.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
              .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
        galaxyG.attr('transform',d=>`translate(${d.x},${d.y})`);
    });

    // Fade in
    galaxyG.style('opacity',0).transition().duration(600).style('opacity',1);

    // Start orbit animation
    startOrbitAnimation();
}


// ── Orbit Animation ──
function startOrbitAnimation(){
    stopOrbitAnimation();
    let t = 0;
    orbitTimer = d3.timer(()=>{
        t += 1;
        g.selectAll('.orbit-planet').each(function(){
            const el = d3.select(this);
            const d = el.datum();
            if(!d) return;
            const newAngle = d.angle + t * d.speed;
            const ys = d.yScale || 1;
            el.attr('cx', Math.cos(newAngle) * d.orbitR)
              .attr('cy', Math.sin(newAngle) * d.orbitR * ys);
        });
        // Sync glow halos with planets
        g.selectAll('.orbit-planet-glow').each(function(_, i){
            const el = d3.select(this);
            const d = el.datum();
            if(!d) return;
            const newAngle = d.angle + t * d.speed;
            const ys = d.yScale || 1;
            el.attr('cx', Math.cos(newAngle) * d.orbitR)
              .attr('cy', Math.sin(newAngle) * d.orbitR * ys);
        });
    });
}
function stopOrbitAnimation(){ if(orbitTimer){orbitTimer.stop();orbitTimer=null} }


// ── Dive into a Galaxy (show nodes of that type) ──
function diveIntoGalaxy(entityType){
    viewMode = 'galaxy-dive';
    currentGalaxy = entityType;
    updateModeUI();

    // Reset zoom
    svg.transition().duration(400).call(d3.zoom().transform, d3.zoomIdentity);

    stopOrbitAnimation();
    if(galaxySim){galaxySim.stop();galaxySim=null}
    if(sim){sim.stop();sim=null}
    g.selectAll('*').remove();

    renderGalaxyDive(entityType);
}

function renderGalaxyDive(entityType){
    const el=document.getElementById('ga'), w=el.clientWidth, h=el.clientHeight;
    const color = C[entityType] || '#6B7280';

    // Primary nodes: this galaxy's nodes
    const primaryNodes = gD.nodes.filter(n=>n.entity_type===entityType);
    const primaryIds = new Set(primaryNodes.map(n=>n.id));

    // Find connected nodes from other galaxies (show as smaller)
    const neighborIds = new Set();
    for(const e of gD.edges){
        if(primaryIds.has(e.from_id) && !primaryIds.has(e.to_id)) neighborIds.add(e.to_id);
        if(primaryIds.has(e.to_id) && !primaryIds.has(e.from_id)) neighborIds.add(e.from_id);
    }
    const neighborNodes = gD.nodes.filter(n=>neighborIds.has(n.id));

    const allNodes = [...primaryNodes, ...neighborNodes];
    const allIds = new Set(allNodes.map(n=>n.id));
    const links = gD.edges.filter(e=>allIds.has(e.from_id)&&allIds.has(e.to_id))
        .map(e=>({...e, source:e.from_id, target:e.to_id}));

    sim = d3.forceSimulation(allNodes)
        .force('link', d3.forceLink(links).id(d=>d.id).distance(140))
        .force('charge', d3.forceManyBody().strength(-350))
        .force('center', d3.forceCenter(w/2, h/2))
        .force('collision', d3.forceCollide().radius(d=>nr(d)+20));

    // Background nebula ring
    g.append('circle')
        .attr('cx', w/2).attr('cy', h/2)
        .attr('r', Math.min(w,h)*0.35)
        .attr('fill','none').attr('stroke', color+'15')
        .attr('stroke-width', 60)
        .attr('filter','url(#glow)');

    // Edges
    lE = g.append('g').selectAll('line').data(links).join('line')
        .attr('stroke', d=>{
            const fromPrimary = primaryIds.has(d.source.id||d.source);
            return fromPrimary ? color+'4D' : '#47556933';
        })
        .attr('stroke-width', 1.5).attr('marker-end','url(#arr)')
        .on('mouseover',(e,d)=>sT(e,`<b>${d.type}</b><br>${d.context||''}`)).on('mouseout',hT);

    // Nodes
    nE = g.append('g').selectAll('circle').data(allNodes).join('circle')
        .attr('r', d=> primaryIds.has(d.id) ? nr(d) : Math.max(4, nr(d)*0.6))
        .attr('fill', d=> primaryIds.has(d.id) ? color : (C[d.entity_type]||'#6B7280'))
        .attr('stroke', d=> primaryIds.has(d.id) ? '#0f172a' : '#0f172a')
        .attr('stroke-width', 1.5)
        .attr('opacity', d=> primaryIds.has(d.id) ? 1 : 0.4)
        .style('cursor','pointer')
        .call(d3.drag()
            .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y})
            .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y})
            .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}))
        .on('mouseover',(e,d)=>{
            const connCount = gD.edges.filter(x=>x.from_id===d.id||x.to_id===d.id).length;
            const fromOther = !primaryIds.has(d.id) ? `<span class="tp" style="color:${C[d.entity_type]||'#6B7280'}">${d.entity_type} (neighbor galaxy)</span>` : `<span class="tp">${d.entity_type}</span>`;
            sT(e,`<b>${d.name}</b>${fromOther}${d.description?`<div class="td2">${d.description}</div>`:''}<div class="tm">${d.mention_count||1} mentions · ${connCount} connections</div>`)
        })
        .on('mouseout',hT)
        .on('click',(e,d)=>{e.stopPropagation();showDP(d)})
        .on('dblclick',(e,d)=>{
            e.stopPropagation();
            if(!primaryIds.has(d.id)){
                diveIntoGalaxy(d.entity_type);
            } else {
                focN(d);
            }
        });

    // Labels for all nodes
    const diveLabelG = g.append('g').selectAll('g').data(allNodes).join('g').attr('pointer-events','none');
    diveLabelG.append('text')
        .attr('font-size', d=> primaryIds.has(d.id) ? Math.max(10, nr(d)*0.35) : 9)
        .attr('fill', d=> primaryIds.has(d.id) ? '#f1f5f9' : '#64748b')
        .attr('font-weight', d=> primaryIds.has(d.id) ? 600 : 400)
        .attr('text-anchor','middle')
        .attr('dy', d=> {const r = primaryIds.has(d.id) ? nr(d) : Math.max(8,nr(d)*0.6); return r+14})
        .text(d=>d.name.length>22?d.name.slice(0,20)+'…':d.name);
    diveLabelG.filter(d=>primaryIds.has(d.id)).append('text')
        .attr('font-size',9).attr('fill',d=>(C[d.entity_type]||'#6B7280')+'CC')
        .attr('text-anchor','middle').attr('dy',d=>nr(d)+26)
        .text(d=>d.entity_type);

    sim.on('tick',()=>{
        lE.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
        nE.attr('cx',d=>d.x).attr('cy',d=>d.y);
        diveLabelG.attr('transform',d=>`translate(${d.x},${d.y})`);
    });

    nE.style('opacity',0).transition().duration(400).style('opacity',d=>primaryIds.has(d.id)?1:0.4);

    setTimeout(()=>spawnEdgeParticles(), 500);
}


// ── Back to Universe ──
function backToUniverse(){
    viewMode = 'galaxy';
    currentGalaxy = null;
    svg.transition().duration(400).call(d3.zoom().transform, d3.zoomIdentity);
    render();
}


// ── UI Updates ──
function updateModeUI(){
    const backBtn = document.getElementById('galaxyBack');
    const badge = document.getElementById('modeBadge');

    if(viewMode === 'galaxy'){
        backBtn.classList.remove('show');
        badge.textContent = 'UNIVERSE VIEW — ' + gD.nodes.length + ' entities across ' + Object.keys(C).length + ' galaxies';
        badge.classList.add('show');
    } else if(viewMode === 'galaxy-dive'){
        backBtn.classList.add('show');
        const count = gD.nodes.filter(n=>n.entity_type===currentGalaxy).length;
        badge.textContent = currentGalaxy + ' Galaxy — ' + count + ' entities';
        badge.classList.add('show');
    } else {
        backBtn.classList.remove('show');
        badge.classList.remove('show');
    }
}

let dc='dot';if(x.positive>0)dc+=' pos';else if(x.negative>0)dc+=' neg';
if(x.event_count>0)div.innerHTML+=`<div class="${dc}"></div>`;div.title=`${x.day_date}: ${x.event_count} events`;
div.onclick=()=>loadDay(x.day_date);tl.appendChild(div)})}catch(e){}}

async function loadDay(dt){prg('Loading '+dt+'...');try{const r=await fetch(`${A}/simulation/events?date=${dt}`);const d=await r.json();const evs=d.events||[];
document.getElementById('dpc').innerHTML=`<h2>${dt}</h2><p>${evs.length} events</p>${evs.map(e=>`<div class="cn"><b>${e.event_type}</b> — ${e.agent_name}<br><span style="color:#94a3b8;font-size:10px">${(e.content||'').slice(0,100)}</span></div>`).join('')}`;
document.getElementById('dp').classList.add('open');prg('')}catch(e){prg('Error: '+e.message)}}

init();
</script>
</body>
</html>
