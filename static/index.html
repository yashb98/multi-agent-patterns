<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindGraph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

/* Top bar */
.topbar { position: fixed; top: 0; left: 0; right: 0; height: 52px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 100; }
.topbar h1 { font-size: 16px; font-weight: 600; color: #8B5CF6; margin-right: 12px; }
#search { background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: #e2e8f0; padding: 6px 12px; width: 220px; font-size: 13px; }
#search:focus { outline: none; border-color: #8B5CF6; }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn { font-size: 11px; padding: 3px 8px; border-radius: 4px; border: 1px solid #475569; background: transparent; color: #94a3b8; cursor: pointer; transition: all .15s; }
.filter-btn.active { background: var(--color); color: #fff; border-color: var(--color); }
.topbar-right { margin-left: auto; display: flex; gap: 8px; }
.btn { font-size: 12px; padding: 5px 12px; border-radius: 5px; border: 1px solid #475569; background: #1e293b; color: #e2e8f0; cursor: pointer; }
.btn:hover { background: #334155; }

/* Sidebar */
.sidebar { position: fixed; top: 52px; left: 0; bottom: 0; width: 300px; background: #1e293b; border-right: 1px solid #334155; z-index: 90; transition: transform .2s; overflow-y: auto; padding: 16px; }
.sidebar.collapsed { transform: translateX(-300px); }
.sidebar-toggle { position: fixed; top: 60px; left: 4px; z-index: 95; background: #334155; border: none; color: #e2e8f0; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 16px; }
.sidebar.collapsed ~ .sidebar-toggle { left: 4px; }
.tab-group { display: flex; gap: 0; margin-bottom: 12px; }
.tab { flex: 1; padding: 8px; text-align: center; font-size: 12px; cursor: pointer; border: 1px solid #475569; background: transparent; color: #94a3b8; }
.tab:first-child { border-radius: 6px 0 0 6px; }
.tab:last-child { border-radius: 0 6px 6px 0; }
.tab.active { background: #8B5CF6; color: #fff; border-color: #8B5CF6; }
.tab-content { display: none; }
.tab-content.active { display: block; }
textarea { width: 100%; height: 200px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: #e2e8f0; padding: 10px; font-size: 13px; resize: vertical; font-family: inherit; }
textarea:focus { outline: none; border-color: #8B5CF6; }
.dropzone { border: 2px dashed #475569; border-radius: 8px; padding: 40px 16px; text-align: center; color: #64748b; font-size: 13px; cursor: pointer; transition: all .2s; }
.dropzone:hover, .dropzone.dragover { border-color: #8B5CF6; color: #8B5CF6; }
.dropzone input { display: none; }
#url-input { width: 100%; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: #e2e8f0; padding: 8px 12px; font-size: 13px; margin-bottom: 8px; }
.extract-btn { width: 100%; padding: 10px; background: #8B5CF6; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 600; }
.extract-btn:hover { background: #7c3aed; }
.extract-btn:disabled { opacity: 0.5; cursor: not-allowed; }
#progress { margin-top: 10px; font-size: 12px; color: #94a3b8; }
.toast { position: fixed; bottom: 20px; right: 20px; background: #10B981; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity .3s; }
.toast.show { opacity: 1; }

/* Graph area */
.graph-area { position: fixed; top: 52px; left: 300px; right: 0; bottom: 0; }
.graph-area.full { left: 0; }
svg { width: 100%; height: 100%; }

/* Stats panel */
.stats { position: fixed; top: 60px; right: 12px; background: #1e293b99; backdrop-filter: blur(8px); border: 1px solid #334155; border-radius: 8px; padding: 12px 16px; font-size: 12px; z-index: 80; min-width: 180px; }
.stats h3 { font-size: 11px; text-transform: uppercase; color: #64748b; margin-bottom: 6px; }
.stat-row { display: flex; justify-content: space-between; margin: 3px 0; }
.stat-val { color: #8B5CF6; font-weight: 600; }

/* Legend */
.legend { position: fixed; bottom: 12px; left: 312px; background: #1e293b99; backdrop-filter: blur(8px); border: 1px solid #334155; border-radius: 8px; padding: 10px 14px; z-index: 80; display: flex; flex-wrap: wrap; gap: 8px; }
.legend.full { left: 12px; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #94a3b8; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

/* Detail panel */
.detail-panel { position: fixed; top: 52px; right: -350px; bottom: 0; width: 350px; background: #1e293b; border-left: 1px solid #334155; z-index: 85; transition: right .2s; padding: 20px; overflow-y: auto; }
.detail-panel.open { right: 0; }
.detail-panel h2 { font-size: 18px; margin-bottom: 4px; }
.detail-panel .type-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-bottom: 8px; }
.detail-panel p { font-size: 13px; color: #94a3b8; margin-bottom: 12px; }
.detail-panel h4 { font-size: 12px; text-transform: uppercase; color: #64748b; margin: 12px 0 6px; }
.connection { font-size: 12px; padding: 4px 0; border-bottom: 1px solid #1e293b; color: #cbd5e1; }
.close-detail { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #64748b; font-size: 18px; cursor: pointer; }

/* Tooltip */
.tooltip { position: fixed; background: #1e293b; border: 1px solid #475569; border-radius: 6px; padding: 8px 12px; font-size: 12px; pointer-events: none; z-index: 150; max-width: 300px; opacity: 0; transition: opacity .15s; }
.tooltip.show { opacity: 1; }
.tooltip .tt-name { font-weight: 600; color: #f1f5f9; }
.tooltip .tt-type { color: #8B5CF6; font-size: 11px; }
.tooltip .tt-desc { color: #94a3b8; margin-top: 4px; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
    <h1>MindGraph</h1>
    <input type="text" id="search" placeholder="Search entities...">
    <div class="filter-group" id="filters"></div>
    <div class="topbar-right">
        <button class="btn" onclick="resetView()">Reset</button>
        <button class="btn" onclick="exportPNG()">Export PNG</button>
    </div>
</div>

<!-- Sidebar -->
<button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
<div class="sidebar" id="sidebar">
    <div class="tab-group">
        <div class="tab active" onclick="switchTab('paste')">Paste</div>
        <div class="tab" onclick="switchTab('upload')">Upload</div>
        <div class="tab" onclick="switchTab('url')">URL</div>
    </div>
    <div class="tab-content active" id="tab-paste">
        <textarea id="paste-text" placeholder="Paste text here to extract knowledge..."></textarea>
        <button class="extract-btn" onclick="ingestPaste()">Extract Knowledge</button>
    </div>
    <div class="tab-content" id="tab-upload">
        <div class="dropzone" id="dropzone" onclick="document.getElementById('file-input').click()">
            Drop .md or .txt file here<br>or click to browse
            <input type="file" id="file-input" accept=".md,.txt,.text,.markdown">
        </div>
        <div id="file-name" style="margin-top:8px;font-size:12px;color:#64748b;"></div>
        <button class="extract-btn" onclick="ingestFile()" style="margin-top:8px;">Extract from File</button>
    </div>
    <div class="tab-content" id="tab-url">
        <input type="text" id="url-input" placeholder="https://example.com/article">
        <button class="extract-btn" onclick="ingestURL()">Fetch & Extract</button>
    </div>
    <div id="progress"></div>
</div>

<!-- Graph -->
<div class="graph-area" id="graph-area"><svg id="graph-svg"></svg></div>

<!-- Stats -->
<div class="stats" id="stats-panel"></div>

<!-- Legend -->
<div class="legend" id="legend"></div>

<!-- Detail panel -->
<div class="detail-panel" id="detail-panel">
    <button class="close-detail" onclick="closeDetail()">✕</button>
    <div id="detail-content"></div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = '/api/mindgraph';
const COLORS = {
    PROJECT: '#8B5CF6', TECHNOLOGY: '#3B82F6', CONCEPT: '#10B981',
    DECISION: '#F59E0B', PERSON: '#EC4899', COMPANY: '#EF4444',
    METRIC: '#6B7280', SKILL: '#14B8A6', PHASE: '#6366F1', RESEARCH_PAPER: '#EAB308'
};

let simulation, svg, g, nodeElements, linkElements;
let graphData = { nodes: [], edges: [] };
let activeFilters = new Set(Object.keys(COLORS));
let searchQuery = '';
let selectedNode = null;

// ── Init ──
function init() {
    buildFilters();
    buildLegend();
    setupSVG();
    setupSearch();
    setupDropzone();
    loadGraph();
}

function buildFilters() {
    const container = document.getElementById('filters');
    for (const [type, color] of Object.entries(COLORS)) {
        const btn = document.createElement('button');
        btn.className = 'filter-btn active';
        btn.style.setProperty('--color', color);
        btn.textContent = type;
        btn.onclick = () => toggleFilter(type, btn);
        container.appendChild(btn);
    }
}

function buildLegend() {
    const container = document.getElementById('legend');
    for (const [type, color] of Object.entries(COLORS)) {
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `<div class="legend-dot" style="background:${color}"></div>${type}`;
        container.appendChild(item);
    }
}

function setupSVG() {
    const area = document.getElementById('graph-area');
    svg = d3.select('#graph-svg');
    const width = area.clientWidth;
    const height = area.clientHeight;

    svg.append('defs').append('marker')
        .attr('id', 'arrow').attr('viewBox', '0 -5 10 10')
        .attr('refX', 20).attr('refY', 0).attr('markerWidth', 6).attr('markerHeight', 6)
        .attr('orient', 'auto')
        .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', '#475569');

    g = svg.append('g');
    svg.call(d3.zoom().scaleExtent([0.1, 8]).on('zoom', e => g.attr('transform', e.transform)));
    svg.on('click', e => { if (e.target.tagName === 'svg') { closeDetail(); resetHighlight(); } });
}

function setupSearch() {
    let timeout;
    document.getElementById('search').addEventListener('input', e => {
        clearTimeout(timeout);
        timeout = setTimeout(() => { searchQuery = e.target.value.toLowerCase(); updateHighlight(); }, 300);
    });
}

function setupDropzone() {
    const dz = document.getElementById('dropzone');
    const fi = document.getElementById('file-input');
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
    dz.addEventListener('drop', e => {
        e.preventDefault(); dz.classList.remove('dragover');
        if (e.dataTransfer.files.length) { fi.files = e.dataTransfer.files; showFileName(fi.files[0].name); }
    });
    fi.addEventListener('change', () => { if (fi.files.length) showFileName(fi.files[0].name); });
}

function showFileName(name) { document.getElementById('file-name').textContent = `Selected: ${name}`; }

// ── Graph rendering ──
async function loadGraph() {
    try {
        const resp = await fetch(`${API}/graph`);
        graphData = await resp.json();
        renderGraph();
        updateStats();
    } catch (e) { console.error('Failed to load graph:', e); }
}

function renderGraph() {
    g.selectAll('*').remove();
    const area = document.getElementById('graph-area');
    const width = area.clientWidth, height = area.clientHeight;

    const nodes = graphData.nodes.filter(n => activeFilters.has(n.entity_type));
    const nodeIds = new Set(nodes.map(n => n.id));
    const links = graphData.edges.filter(e => nodeIds.has(e.from_id) && nodeIds.has(e.to_id))
        .map(e => ({ ...e, source: e.from_id, target: e.to_id }));

    simulation = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(d => d.id).distance(80))
        .force('charge', d3.forceManyBody().strength(-200))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collision', d3.forceCollide().radius(d => nodeRadius(d) + 4));

    linkElements = g.append('g').selectAll('line').data(links).join('line')
        .attr('stroke', d => { const src = nodes.find(n => n.id === (d.source.id || d.source)); return src ? COLORS[src.entity_type] + '4D' : '#475569'; })
        .attr('stroke-width', 1.5).attr('marker-end', 'url(#arrow)')
        .on('mouseover', (e, d) => showTooltip(e, `<b>${d.type}</b><br>${d.context || ''}`))
        .on('mouseout', hideTooltip);

    nodeElements = g.append('g').selectAll('circle').data(nodes).join('circle')
        .attr('r', nodeRadius)
        .attr('fill', d => COLORS[d.entity_type] || '#6B7280')
        .attr('stroke', '#0f172a').attr('stroke-width', 1.5)
        .style('cursor', 'pointer')
        .call(d3.drag().on('start', dragStart).on('drag', dragging).on('end', dragEnd))
        .on('mouseover', (e, d) => showTooltip(e, `<span class="tt-name">${d.name}</span><br><span class="tt-type">${d.entity_type}</span>${d.description ? `<div class="tt-desc">${d.description}</div>` : ''}`))
        .on('mouseout', hideTooltip)
        .on('click', (e, d) => { e.stopPropagation(); showDetail(d); })
        .on('dblclick', (e, d) => { e.stopPropagation(); focusNode(d); });

    // Labels
    g.append('g').selectAll('text').data(nodes).join('text')
        .attr('font-size', d => Math.max(9, nodeRadius(d) * 0.6))
        .attr('fill', '#e2e8f0').attr('text-anchor', 'middle').attr('dy', d => nodeRadius(d) + 14)
        .attr('pointer-events', 'none')
        .text(d => d.name.length > 20 ? d.name.slice(0, 18) + '…' : d.name);

    simulation.on('tick', () => {
        linkElements.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        nodeElements.attr('cx', d => d.x).attr('cy', d => d.y);
        g.selectAll('text').attr('x', d => d.x).attr('y', d => d.y);
    });

    // Fade-in animation
    nodeElements.style('opacity', 0).transition().duration(500).style('opacity', 1);
}

function nodeRadius(d) { return Math.max(8, Math.min(40, 8 + (d.mention_count || 1) * 4)); }

// ── Interactions ──
function dragStart(e, d) { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
function dragging(e, d) { d.fx = e.x; d.fy = e.y; }
function dragEnd(e, d) { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }

function showTooltip(e, html) {
    const tt = document.getElementById('tooltip');
    tt.innerHTML = html; tt.classList.add('show');
    tt.style.left = (e.pageX + 12) + 'px'; tt.style.top = (e.pageY - 10) + 'px';
}
function hideTooltip() { document.getElementById('tooltip').classList.remove('show'); }

function showDetail(node) {
    selectedNode = node;
    const panel = document.getElementById('detail-panel');
    const color = COLORS[node.entity_type] || '#6B7280';
    const connections = [];
    graphData.edges.forEach(e => {
        if (e.from_id === node.id) {
            const target = graphData.nodes.find(n => n.id === e.to_id);
            if (target) connections.push(`→ <b>${e.type}</b> → ${target.name}`);
        }
        if (e.to_id === node.id) {
            const source = graphData.nodes.find(n => n.id === e.from_id);
            if (source) connections.push(`${source.name} → <b>${e.type}</b> →`);
        }
    });

    document.getElementById('detail-content').innerHTML = `
        <h2>${node.name}</h2>
        <span class="type-badge" style="background:${color}33;color:${color}">${node.entity_type}</span>
        <p>${node.description || 'No description'}</p>
        <div class="stat-row"><span>Mentions</span><span class="stat-val">${node.mention_count}</span></div>
        <div class="stat-row"><span>Importance</span><span class="stat-val">${(node.importance * 100).toFixed(0)}%</span></div>
        <h4>Connections (${connections.length})</h4>
        ${connections.map(c => `<div class="connection">${c}</div>`).join('')}
    `;
    panel.classList.add('open');
}

function closeDetail() { document.getElementById('detail-panel').classList.remove('open'); selectedNode = null; }

function focusNode(node) {
    const neighborIds = new Set([node.id]);
    graphData.edges.forEach(e => {
        if (e.from_id === node.id) neighborIds.add(e.to_id);
        if (e.to_id === node.id) neighborIds.add(e.from_id);
    });
    nodeElements.style('opacity', d => neighborIds.has(d.id) ? 1 : 0.1);
    linkElements.style('opacity', d => {
        const sid = d.source.id || d.source, tid = d.target.id || d.target;
        return neighborIds.has(sid) && neighborIds.has(tid) ? 1 : 0.05;
    });
}

function resetHighlight() {
    nodeElements.style('opacity', 1);
    linkElements.style('opacity', 1);
}

function updateHighlight() {
    if (!searchQuery) { resetHighlight(); return; }
    nodeElements.style('opacity', d => d.name.toLowerCase().includes(searchQuery) ? 1 : 0.15);
    linkElements.style('opacity', 0.1);
}

function toggleFilter(type, btn) {
    if (activeFilters.has(type)) { activeFilters.delete(type); btn.classList.remove('active'); }
    else { activeFilters.add(type); btn.classList.add('active'); }
    renderGraph();
}

function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    const ga = document.getElementById('graph-area');
    const lg = document.getElementById('legend');
    sb.classList.toggle('collapsed');
    ga.classList.toggle('full');
    lg.classList.toggle('full');
}

function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
}

function resetView() { svg.transition().duration(500).call(d3.zoom().transform, d3.zoomIdentity); resetHighlight(); }

async function exportPNG() {
    const svgEl = document.getElementById('graph-svg');
    const canvas = document.createElement('canvas');
    const rect = svgEl.getBoundingClientRect();
    canvas.width = rect.width * 2; canvas.height = rect.height * 2;
    const ctx = canvas.getContext('2d');
    ctx.scale(2, 2); ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, rect.width, rect.height);
    const svgData = new XMLSerializer().serializeToString(svgEl);
    const img = new Image();
    img.onload = () => { ctx.drawImage(img, 0, 0); const a = document.createElement('a'); a.download = 'mindgraph.png'; a.href = canvas.toDataURL(); a.click(); };
    img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
}

// ── Ingest ──
function showProgress(msg) { document.getElementById('progress').textContent = msg; }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

async function ingestPaste() {
    const text = document.getElementById('paste-text').value;
    if (!text.trim()) return;
    showProgress('Extracting knowledge...');
    try {
        const resp = await fetch(`${API}/ingest/json`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ text })
        });
        const result = await resp.json();
        if (result.status === 'already_processed') { showProgress('Already processed'); return; }
        showProgress(`Done: ${result.entities_extracted} entities, ${result.relations_extracted} relations`);
        showToast(`✓ Extracted ${result.entities_extracted} entities`);
        loadGraph();
    } catch (e) { showProgress(`Error: ${e.message}`); }
}

async function ingestFile() {
    const fi = document.getElementById('file-input');
    if (!fi.files.length) return;
    const formData = new FormData();
    formData.append('file', fi.files[0]);
    showProgress('Processing file...');
    try {
        const resp = await fetch(`${API}/ingest`, { method: 'POST', body: formData });
        const result = await resp.json();
        showProgress(`Done: ${result.entities_extracted} entities, ${result.relations_extracted} relations`);
        showToast(`✓ Extracted ${result.entities_extracted} entities from ${fi.files[0].name}`);
        loadGraph();
    } catch (e) { showProgress(`Error: ${e.message}`); }
}

async function ingestURL() {
    const url = document.getElementById('url-input').value;
    if (!url.trim()) return;
    showProgress('Fetching URL...');
    try {
        const resp = await fetch(`${API}/ingest/json`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ url })
        });
        const result = await resp.json();
        showProgress(`Done: ${result.entities_extracted} entities, ${result.relations_extracted} relations`);
        showToast(`✓ Extracted ${result.entities_extracted} entities from URL`);
        loadGraph();
    } catch (e) { showProgress(`Error: ${e.message}`); }
}

// ── Stats ──
async function updateStats() {
    try {
        const resp = await fetch(`${API}/stats`);
        const stats = await resp.json();
        const panel = document.getElementById('stats-panel');
        panel.innerHTML = `<h3>Graph Stats</h3>
            <div class="stat-row"><span>Entities</span><span class="stat-val">${stats.total_entities}</span></div>
            <div class="stat-row"><span>Connections</span><span class="stat-val">${stats.total_relations}</span></div>
            ${stats.top_entities.map(e => `<div class="stat-row"><span style="color:${COLORS[e.entity_type]}">${e.name}</span><span class="stat-val">${e.mention_count}</span></div>`).join('')}`;
    } catch (e) {}
}

// ── Start ──
init();
</script>
</body>
</html>
