<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge MindGraph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;height:100vh}
.topbar{position:fixed;top:0;left:0;right:0;height:50px;background:#1e293b;border-bottom:1px solid #334155;display:flex;align-items:center;padding:0 14px;gap:10px;z-index:100}
.topbar h1{font-size:15px;font-weight:600;color:#8B5CF6;white-space:nowrap}
#search{background:#0f172a;border:1px solid #475569;border-radius:5px;color:#e2e8f0;padding:5px 10px;width:200px;font-size:12px}
#search:focus{outline:none;border-color:#8B5CF6}
.fg{display:flex;gap:4px;flex-wrap:wrap}
.fb{font-size:10px;padding:2px 6px;border-radius:3px;border:1px solid #475569;background:transparent;color:#94a3b8;cursor:pointer}
.fb.on{background:var(--c);color:#fff;border-color:var(--c)}
.tr{margin-left:auto;display:flex;gap:6px}
.btn{font-size:11px;padding:4px 10px;border-radius:4px;border:1px solid #475569;background:#1e293b;color:#e2e8f0;cursor:pointer}
.btn:hover{background:#334155}
.sb{position:fixed;top:50px;left:0;bottom:40px;width:280px;background:#1e293b;border-right:1px solid #334155;z-index:90;overflow-y:auto;padding:14px;transition:transform .2s}
.sb.hide{transform:translateX(-280px)}
.st{position:fixed;top:56px;left:4px;z-index:95;background:#334155;border:none;color:#e2e8f0;padding:3px 7px;border-radius:3px;cursor:pointer;font-size:14px}
.tg{display:flex;margin-bottom:10px}.tb{flex:1;padding:6px;text-align:center;font-size:11px;cursor:pointer;border:1px solid #475569;background:transparent;color:#94a3b8}
.tb:first-child{border-radius:5px 0 0 5px}.tb:last-child{border-radius:0 5px 5px 0}.tb.on{background:#8B5CF6;color:#fff;border-color:#8B5CF6}
.tc{display:none}.tc.on{display:block}
textarea{width:100%;height:160px;background:#0f172a;border:1px solid #475569;border-radius:5px;color:#e2e8f0;padding:8px;font-size:12px;resize:vertical;font-family:inherit}
textarea:focus{outline:none;border-color:#8B5CF6}
.dz{border:2px dashed #475569;border-radius:7px;padding:30px 14px;text-align:center;color:#64748b;font-size:12px;cursor:pointer}.dz:hover{border-color:#8B5CF6;color:#8B5CF6}.dz input{display:none}
#ui{width:100%;background:#0f172a;border:1px solid #475569;border-radius:5px;color:#e2e8f0;padding:7px 10px;font-size:12px;margin-bottom:6px}
.xb{width:100%;padding:8px;background:#8B5CF6;color:#fff;border:none;border-radius:5px;font-size:12px;cursor:pointer;font-weight:600;margin-top:6px}.xb:hover{background:#7c3aed}
#prog{margin-top:8px;font-size:11px;color:#94a3b8}
.ga{position:fixed;top:50px;left:280px;right:0;bottom:40px}.ga.full{left:0}
svg{width:100%;height:100%}
.dp{position:fixed;top:50px;right:-360px;bottom:40px;width:360px;background:#1e293b;border-left:1px solid #334155;z-index:85;transition:right .2s;padding:18px;overflow-y:auto}.dp.open{right:0}
.dp h2{font-size:17px;margin-bottom:3px}.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;margin-bottom:6px}
.dp p{font-size:12px;color:#94a3b8;margin-bottom:10px}.dp h4{font-size:11px;text-transform:uppercase;color:#64748b;margin:10px 0 5px}
.cn{font-size:11px;padding:3px 0;border-bottom:1px solid #0f172a;color:#cbd5e1}.dc{position:absolute;top:10px;right:10px;background:none;border:none;color:#64748b;font-size:16px;cursor:pointer}
.sp{position:fixed;top:56px;right:10px;background:#1e293b99;backdrop-filter:blur(8px);border:1px solid #334155;border-radius:7px;padding:10px 14px;font-size:11px;z-index:80;min-width:160px}
.sp h3{font-size:10px;text-transform:uppercase;color:#64748b;margin-bottom:4px}.sr{display:flex;justify-content:space-between;margin:2px 0}.sv{color:#8B5CF6;font-weight:600}
.tl{position:fixed;bottom:0;left:0;right:0;height:40px;background:#1e293b;border-top:1px solid #334155;display:flex;align-items:center;padding:0 14px;gap:6px;overflow-x:auto;z-index:100}
.td{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;cursor:pointer;border:1px solid #334155;color:#94a3b8;flex-shrink:0;position:relative}
.td:hover{border-color:#8B5CF6}.td.now{border-color:#8B5CF6;color:#fff;background:#8B5CF622}
.td .dot{position:absolute;bottom:-2px;width:4px;height:4px;border-radius:50%;background:#3B82F6}
.td .dot.pos{background:#10B981}.td .dot.neg{background:#EF4444}
.tll{font-size:10px;color:#64748b;white-space:nowrap;margin-right:6px}
.tt{position:fixed;background:#1e293b;border:1px solid #475569;border-radius:5px;padding:7px 10px;font-size:11px;pointer-events:none;z-index:150;max-width:280px;opacity:0;transition:opacity .12s}.tt.show{opacity:1}
.tt b{color:#f1f5f9}.tt .tp{color:#8B5CF6;font-size:10px}.tt .td2{color:#94a3b8;margin-top:3px}
.lg{position:fixed;bottom:46px;left:286px;background:#1e293b99;backdrop-filter:blur(8px);border:1px solid #334155;border-radius:7px;padding:6px 10px;z-index:80;display:flex;flex-wrap:wrap;gap:6px}.lg.full{left:6px}
.li{display:flex;align-items:center;gap:3px;font-size:10px;color:#94a3b8;cursor:pointer}.ld{width:8px;height:8px;border-radius:50%}
.toast{position:fixed;bottom:50px;right:16px;background:#10B981;color:#fff;padding:10px 16px;border-radius:7px;font-size:12px;z-index:200;opacity:0;transition:opacity .3s}.toast.show{opacity:1}
</style>
</head>
<body>
<div class="topbar"><h1>Knowledge MindGraph</h1><input type="text" id="search" placeholder="Search entities..."><div class="fg" id="fil"></div><div class="tr"><button class="btn" onclick="resetV()">Reset</button><button class="btn" onclick="expPNG()">PNG</button></div></div>
<button class="st" onclick="togSB()">☰</button>
<div class="sb" id="sb"><div class="tg"><div class="tb on" onclick="stab('paste',this)">Paste</div><div class="tb" onclick="stab('upload',this)">Upload</div><div class="tb" onclick="stab('url',this)">URL</div></div>
<div class="tc on" id="t-paste"><textarea id="ptxt" placeholder="Paste text to extract knowledge..."></textarea><button class="xb" onclick="iPaste()">Extract</button></div>
<div class="tc" id="t-upload"><div class="dz" onclick="document.getElementById('fi').click()">Drop .md/.txt here or click<input type="file" id="fi" accept=".md,.txt"></div><div id="fn" style="margin-top:6px;font-size:11px;color:#64748b"></div><button class="xb" onclick="iFile()">Extract File</button></div>
<div class="tc" id="t-url"><input type="text" id="ui" placeholder="https://..."><button class="xb" onclick="iURL()">Fetch & Extract</button></div>
<div id="prog"></div></div>
<div class="ga" id="ga"><svg id="svg"></svg></div>
<div class="sp" id="sp"></div>
<div class="lg" id="lg"></div>
<div class="dp" id="dp"><button class="dc" onclick="closeDP()">✕</button><div id="dpc"></div></div>
<div class="tt" id="tt"></div>
<div class="toast" id="toast"></div>
<div class="tl" id="tl"><span class="tll">Timeline:</span></div>

<script>
const A='/api/mindgraph',C={PROJECT:'#8B5CF6',TECHNOLOGY:'#3B82F6',CONCEPT:'#10B981',DECISION:'#F59E0B',PERSON:'#EC4899',COMPANY:'#EF4444',METRIC:'#6B7280',SKILL:'#14B8A6',PHASE:'#6366F1',RESEARCH_PAPER:'#EAB308',AGENT:'#A855F7',EVENT:'#F97316',EMAIL:'#FB923C',TASK:'#22D3EE'};
let sim,svg,g,nE,lE,gD={nodes:[],edges:[]},aF=new Set(Object.keys(C)),sq='';

function init(){bFil();bLeg();sSVG();sSrch();sDZ();load();loadTL()}

function bFil(){const c=document.getElementById('fil');for(const[t,cl]of Object.entries(C)){const b=document.createElement('button');b.className='fb on';b.style.setProperty('--c',cl);b.textContent=t;b.onclick=()=>{aF.has(t)?(aF.delete(t),b.classList.remove('on')):(aF.add(t),b.classList.add('on'));render()};c.appendChild(b)}}
function bLeg(){const c=document.getElementById('lg');for(const[t,cl]of Object.entries(C)){const i=document.createElement('div');i.className='li';i.innerHTML=`<div class="ld" style="background:${cl}"></div>${t}`;c.appendChild(i)}}

function sSVG(){svg=d3.select('#svg');svg.append('defs').append('marker').attr('id','arr').attr('viewBox','0 -5 10 10').attr('refX',20).attr('refY',0).attr('markerWidth',5).attr('markerHeight',5).attr('orient','auto').append('path').attr('d','M0,-5L10,0L0,5').attr('fill','#47556966');
g=svg.append('g');svg.call(d3.zoom().scaleExtent([.1,8]).on('zoom',e=>g.attr('transform',e.transform)));svg.on('click',e=>{if(e.target.tagName==='svg'){closeDP();rHL()}})}
function sSrch(){let t;document.getElementById('search').addEventListener('input',e=>{clearTimeout(t);t=setTimeout(()=>{sq=e.target.value.toLowerCase();uHL()},300)})}
function sDZ(){const fi=document.getElementById('fi');fi.addEventListener('change',()=>{if(fi.files.length)document.getElementById('fn').textContent=fi.files[0].name})}

async function load(){try{const[gr,st]=await Promise.all([fetch(`${A}/graph`).then(r=>r.json()),fetch(`${A}/stats`).then(r=>r.json())]);gD=gr;render();uSt(st)}catch(e){}}

function render(){g.selectAll('*').remove();const el=document.getElementById('ga'),w=el.clientWidth,h=el.clientHeight;
const ns=gD.nodes.filter(n=>aF.has(n.entity_type)),nids=new Set(ns.map(n=>n.id));
const ls=gD.edges.filter(e=>nids.has(e.from_id)&&nids.has(e.to_id)).map(e=>({...e,source:e.from_id,target:e.to_id}));
sim=d3.forceSimulation(ns).force('link',d3.forceLink(ls).id(d=>d.id).distance(80)).force('charge',d3.forceManyBody().strength(-180)).force('center',d3.forceCenter(w/2,h/2)).force('collision',d3.forceCollide().radius(d=>nr(d)+4));
lE=g.append('g').selectAll('line').data(ls).join('line').attr('stroke',d=>{const s=ns.find(n=>n.id===(d.source.id||d.source));return s?C[s.entity_type]+'4D':'#475569'}).attr('stroke-width',1.5).attr('marker-end','url(#arr)').on('mouseover',(e,d)=>sT(e,`<b>${d.type}</b><br>${d.context||''}`)).on('mouseout',hT);
nE=g.append('g').selectAll('circle').data(ns).join('circle').attr('r',nr).attr('fill',d=>C[d.entity_type]||'#6B7280').attr('stroke','#0f172a').attr('stroke-width',1.5).style('cursor','pointer')
.call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y}).on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y}).on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}))
.on('mouseover',(e,d)=>sT(e,`<b>${d.name}</b><br><span class="tp">${d.entity_type} · ${d.mention_count} mentions</span>${d.description?`<div class="td2">${d.description}</div>`:''}`))
.on('mouseout',hT).on('click',(e,d)=>{e.stopPropagation();showDP(d)}).on('dblclick',(e,d)=>{e.stopPropagation();focN(d)});
g.append('g').selectAll('text').data(ns).join('text').attr('font-size',d=>Math.max(8,nr(d)*.5)).attr('fill','#e2e8f0').attr('text-anchor','middle').attr('dy',d=>nr(d)+12).attr('pointer-events','none').text(d=>d.name.length>16?d.name.slice(0,14)+'…':d.name);
sim.on('tick',()=>{lE.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);nE.attr('cx',d=>d.x).attr('cy',d=>d.y);g.selectAll('text').attr('x',d=>d.x).attr('y',d=>d.y)});
nE.style('opacity',0).transition().duration(400).style('opacity',1)}

function nr(d){return Math.max(6,Math.min(35,6+(d.mention_count||1)*3))}
function sT(e,h){const t=document.getElementById('tt');t.innerHTML=h;t.classList.add('show');t.style.left=(e.pageX+10)+'px';t.style.top=(e.pageY-8)+'px'}
function hT(){document.getElementById('tt').classList.remove('show')}

async function showDP(n){const p=document.getElementById('dp'),cl=C[n.entity_type]||'#6B7280';
let conns=[],evts=[];try{const r=await fetch(`${A}/entity/${n.id}`);const d=await r.json();conns=d.connections||[];evts=d.recent_events||[]}catch(e){}
const ch=conns.map(c=>{const dir=c.direction==='outgoing'?'→':'←',en=c.entity?.name||'?',ecl=C[c.entity?.entity_type]||'#6B7280';return`<div class="cn">${dir} <b>${c.type}</b> ${dir} <span style="color:${ecl}">${en}</span><br><span style="color:#64748b;font-size:10px">${c.context||''}</span></div>`}).join('');
const eh=evts.slice(0,5).map(e=>`<div class="cn" style="font-size:10px">${e.day_date}: ${(e.content||e.action||'').slice(0,80)}</div>`).join('');
document.getElementById('dpc').innerHTML=`<h2>${n.name}</h2><span class="badge" style="background:${cl}33;color:${cl}">${n.entity_type}</span><p>${n.description||'No description'}</p>
<div class="sr"><span>Mentions</span><span class="sv">${n.mention_count}</span></div><div class="sr"><span>Importance</span><span class="sv">${(n.importance*100).toFixed(0)}%</span></div><div class="sr"><span>Connections</span><span class="sv">${conns.length}</span></div>
<h4>Connections</h4>${ch||'<div class="cn" style="color:#64748b">None</div>'}<h4>Recent Events</h4>${eh||'<div class="cn" style="color:#64748b">No events</div>'}`;
p.classList.add('open')}

function closeDP(){document.getElementById('dp').classList.remove('open')}
function focN(n){const ids=new Set([n.id]);gD.edges.forEach(e=>{if(e.from_id===n.id)ids.add(e.to_id);if(e.to_id===n.id)ids.add(e.from_id)});nE.style('opacity',d=>ids.has(d.id)?1:.1);lE.style('opacity',d=>{const s=d.source.id||d.source,t=d.target.id||d.target;return ids.has(s)&&ids.has(t)?1:.05})}
function rHL(){nE?.style('opacity',1);lE?.style('opacity',1)}
function uHL(){if(!sq){rHL();return}nE.style('opacity',d=>d.name.toLowerCase().includes(sq)?1:.12);lE.style('opacity',.08)}

function togSB(){document.getElementById('sb').classList.toggle('hide');document.getElementById('ga').classList.toggle('full');document.getElementById('lg').classList.toggle('full')}
function stab(n,el){document.querySelectorAll('.tb').forEach(t=>t.classList.remove('on'));document.querySelectorAll('.tc').forEach(t=>t.classList.remove('on'));el.classList.add('on');document.getElementById('t-'+n).classList.add('on')}
function resetV(){svg.transition().duration(400).call(d3.zoom().transform,d3.zoomIdentity);rHL()}
function expPNG(){const s=document.getElementById('svg'),c=document.createElement('canvas'),r=s.getBoundingClientRect();c.width=r.width*2;c.height=r.height*2;const x=c.getContext('2d');x.scale(2,2);x.fillStyle='#0f172a';x.fillRect(0,0,r.width,r.height);const d=new XMLSerializer().serializeToString(s),i=new Image();i.onload=()=>{x.drawImage(i,0,0);const a=document.createElement('a');a.download='mindgraph.png';a.href=c.toDataURL();a.click()};i.src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(d)))}

function prg(m){document.getElementById('prog').textContent=m}
function tst(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
async function iPaste(){const t=document.getElementById('ptxt').value;if(!t.trim())return;prg('Extracting...');try{const r=await fetch(`${A}/ingest/json`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t})});const d=await r.json();prg(`${d.entities_extracted||0} entities, ${d.relations_extracted||0} relations`);tst(`Extracted ${d.entities_extracted||0} entities`);load()}catch(e){prg('Error: '+e.message)}}
async function iFile(){const fi=document.getElementById('fi');if(!fi.files.length)return;const fd=new FormData();fd.append('file',fi.files[0]);prg('Processing...');try{const r=await fetch(`${A}/ingest`,{method:'POST',body:fd});const d=await r.json();prg(`${d.entities_extracted||0} entities`);tst('Extracted from '+fi.files[0].name);load()}catch(e){prg('Error: '+e.message)}}
async function iURL(){const u=document.getElementById('ui').value;if(!u.trim())return;prg('Fetching...');try{const r=await fetch(`${A}/ingest/json`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:u})});const d=await r.json();prg(`${d.entities_extracted||0} entities`);tst('Extracted from URL');load()}catch(e){prg('Error: '+e.message)}}

function uSt(s){const p=document.getElementById('sp'),sm=s.simulation||{};p.innerHTML=`<h3>Stats</h3><div class="sr"><span>Entities</span><span class="sv">${s.total_entities}</span></div><div class="sr"><span>Connections</span><span class="sv">${s.total_relations}</span></div><div class="sr"><span>Events today</span><span class="sv">${sm.today_events||0}</span></div>${(s.top_entities||[]).map(e=>`<div class="sr"><span style="color:${C[e.entity_type]||'#6B7280'}">${e.name}</span><span class="sv">${e.mention_count}</span></div>`).join('')}`}

async function loadTL(){try{const r=await fetch(`${A}/simulation/timeline`);const d=await r.json();const tl=document.getElementById('tl'),td=new Date().toISOString().slice(0,10);
(d.timeline||[]).reverse().forEach(x=>{const div=document.createElement('div');div.className='td'+(x.day_date===td?' now':'');div.textContent=new Date(x.day_date+'T12:00:00').getDate();
let dc='dot';if(x.positive>0)dc+=' pos';else if(x.negative>0)dc+=' neg';
if(x.event_count>0)div.innerHTML+=`<div class="${dc}"></div>`;div.title=`${x.day_date}: ${x.event_count} events`;
div.onclick=()=>loadDay(x.day_date);tl.appendChild(div)})}catch(e){}}

async function loadDay(dt){prg('Loading '+dt+'...');try{const r=await fetch(`${A}/simulation/events?date=${dt}`);const d=await r.json();const evs=d.events||[];
document.getElementById('dpc').innerHTML=`<h2>${dt}</h2><p>${evs.length} events</p>${evs.map(e=>`<div class="cn"><b>${e.event_type}</b> — ${e.agent_name}<br><span style="color:#94a3b8;font-size:10px">${(e.content||'').slice(0,100)}</span></div>`).join('')}`;
document.getElementById('dp').classList.add('open');prg('')}catch(e){prg('Error: '+e.message)}}

init();
</script>
</body>
</html>
