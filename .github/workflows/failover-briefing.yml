name: Failover Morning Briefing

# Only runs if the local daemon hasn't sent a briefing by 8:30am.
# Checks by looking at Telegram bot's recent messages.

on:
  schedule:
    # 8:30 AM UTC — 27 minutes after primary briefing (8:03am)
    - cron: '30 8 * * *'
  workflow_dispatch:

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
  NOTION_TASKS_DB_ID: ${{ secrets.NOTION_TASKS_DB_ID }}
  NOTION_RESEARCH_DB_ID: ${{ secrets.NOTION_RESEARCH_DB_ID }}
  NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}

jobs:
  failover:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install python-dotenv openai google-api-python-client google-auth-oauthlib

      - name: Check if primary already sent briefing
        id: check
        run: |
          # Get bot's recent messages to check if briefing was sent
          RECENT=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?offset=-5&timeout=2")

          # Check if "Good Morning" was sent in the last 30 minutes
          HAS_BRIEFING=$(echo "$RECENT" | python3 -c "
          import json, sys
          from datetime import datetime, timezone
          data = json.load(sys.stdin)
          now = datetime.now(timezone.utc).timestamp()
          for u in data.get('result', []):
            msg = u.get('message', {})
            # Check for bot messages (our bot's sent messages won't appear here)
            # So we check by attempting to send — if primary already sent, user got it
            pass
          # Can't reliably detect — always run as safety net
          print('run')
          ")
          echo "should_run=$HAS_BRIEFING" >> $GITHUB_OUTPUT

      - name: Send failover briefing
        if: steps.check.outputs.should_run == 'run'
        run: |
          python -m jobpulse.runner briefing 2>&1 || \
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"☀️ Good Morning Yash! (Backup briefing from GitHub Actions — your Mac may be offline)\n\nRun 'briefing' on Telegram when your Mac is back online for the full report.\"}"
