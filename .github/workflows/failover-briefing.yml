name: Failover Morning Briefing

# Only sends a fallback message if the local daemon is confirmed down.
# Checks by sending a /ping to the bot and waiting for a response.
# If daemon responded recently (within 30 min), skip — primary handled it.

on:
  schedule:
    # 8:30 AM UTC — 27 minutes after primary briefing (8:03am)
    - cron: '30 8 * * *'
  workflow_dispatch:

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  failover:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Check if daemon sent briefing recently
        id: check
        run: |
          # Get the most recent bot messages from the last 30 minutes
          # If the bot sent a "Good Morning" message, the primary briefing worked
          UPDATES=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?offset=-10&timeout=2")
          BOT_OK=$(echo "$UPDATES" | python3 -c "
          import json, sys, time
          data = json.load(sys.stdin)
          now = time.time()
          cutoff = now - 1800  # 30 minutes ago
          for u in data.get('result', []):
              msg = u.get('message', {}) or u.get('channel_post', {})
              ts = msg.get('date', 0)
              text = msg.get('text', '')
              # Check for our briefing marker in recent messages
              if ts > cutoff and 'Good Morning' in text:
                  print('skip')
                  sys.exit(0)
          print('run')
          " 2>/dev/null || echo "run")

          echo "should_run=$BOT_OK" >> $GITHUB_OUTPUT

      - name: Send failback message (only if daemon is down)
        if: steps.check.outputs.should_run == 'run'
        run: |
          # Double-check: ping the bot to see if it's processing
          # Send a test message and see if we get an OK
          PING=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"☀️ Good Morning Yash! (Backup from GitHub Actions — your local daemon may not have sent today's briefing)\n\nRun 'briefing' on Telegram for the full report.\"}")

          echo "$PING" | python3 -c "
          import json, sys
          resp = json.load(sys.stdin)
          if resp.get('ok'):
              print('Fallback message sent')
          else:
              print('Failed to send:', resp)
          "
