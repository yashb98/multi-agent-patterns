name: Morning Briefing (Backup)

# Backup: only sends a fallback if local daemon didn't send the briefing.
# The full briefing requires local DBs, OAuth tokens, and langchain —
# it cannot run on GitHub Actions. This workflow only sends a nudge.

on:
  schedule:
    # 8:03 AM UTC (same time as local cron — local wins if both fire)
    - cron: '3 8 * * *'
  workflow_dispatch:

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Wait for local daemon to send first
        run: |
          # Give the local cron 90 seconds head start
          echo "Waiting 90s for local daemon..."
          sleep 90

      - name: Check if local daemon sent briefing
        id: check
        run: |
          UPDATES=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?offset=-10&timeout=2")
          RESULT=$(echo "$UPDATES" | python3 -c "
          import json, sys, time
          data = json.load(sys.stdin)
          now = time.time()
          cutoff = now - 300  # 5 minutes ago
          for u in data.get('result', []):
              msg = u.get('message', {}) or u.get('channel_post', {})
              ts = msg.get('date', 0)
              text = msg.get('text', '')
              if ts > cutoff and 'Good Morning' in text:
                  print('skip')
                  sys.exit(0)
          print('run')
          " 2>/dev/null || echo "run")

          echo "should_run=$RESULT" >> $GITHUB_OUTPUT

      - name: Send fallback nudge
        if: steps.check.outputs.should_run == 'run'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"☀️ Morning! Your local briefing didn't fire today. Run 'briefing' on Telegram to get it.\"}"
