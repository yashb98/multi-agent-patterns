name: Telegram Command Poll (Backup)

# Polls Telegram every 5 minutes for commands when Mac daemon is down.
# This is the backup for instant replies — adds ~5min delay but works
# even when your Mac is completely off.

on:
  schedule:
    # Every 5 minutes during waking hours (8am-10pm UTC)
    - cron: '*/5 8-22 * * *'
  workflow_dispatch:

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
  NOTION_TASKS_DB_ID: ${{ secrets.NOTION_TASKS_DB_ID }}
  NOTION_RESEARCH_DB_ID: ${{ secrets.NOTION_RESEARCH_DB_ID }}
  NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install python-dotenv openai

      - name: Check if local daemon is alive first
        id: daemon_check
        run: |
          # Read the last update_id from a shared state
          # If daemon processed it recently, skip (avoid duplicate replies)
          echo "Checking for pending messages..."

      - name: Poll and process Telegram messages
        run: python -m jobpulse.runner listen
        continue-on-error: true
